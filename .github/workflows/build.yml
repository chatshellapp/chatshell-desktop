# Required GitHub Secrets:
#
#   Build & Release:
#     APPLE_CERTIFICATE            - Base64-encoded .p12 certificate (macOS signing)
#     APPLE_CERTIFICATE_PASSWORD   - .p12 password
#     APPLE_TEAM_ID                - Apple Developer Team ID
#     APPLE_API_KEY_CONTENT        - Base64-encoded .p8 API key (notarization)
#     APPLE_API_KEY                - API Key ID
#     APPLE_API_ISSUER             - API Issuer ID
#
#   Cloudflare R2 (dl.chatshell.app):
#     CLOUDFLARE_ACCOUNT_ID        - Cloudflare account ID
#     R2_ACCESS_KEY_ID             - R2 S3-compatible API token
#     R2_SECRET_ACCESS_KEY         - R2 S3-compatible API secret
#     R2_BUCKET_NAME               - R2 bucket name backing dl.chatshell.app
#
#   Website deploy (Cloudflare Pages):
#     CLOUDFLARE_API_TOKEN         - Wrangler API token with Pages edit permission
#     WEBSITE_REPO                 - Website GitHub repo (e.g. chatshellapp/chatshell-website)
#     GH_PAT                       - GitHub PAT with repo read access (if website repo is private)

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Type Check & Lint
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check


  build-windows:
    name: Build Windows
    needs: check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build App
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles msi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatshell-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  build-macos:
    name: Build macOS
    needs: check
    runs-on: macos-14
    permissions:
      contents: read
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_CONTENT != '' && secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Import Code Signing Certificate
        if: ${{ env.HAS_APPLE_CERTIFICATE == 'true' }}
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build Universal App
        run: pnpm tauri build --target universal-apple-darwin --bundles dmg
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Setup API Key for Notarization
        if: ${{ env.HAS_APPLE_API_KEY == 'true' }}
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 -d > api_key.p8

      - name: Notarize and Staple DMG
        if: ${{ env.HAS_APPLE_API_KEY == 'true' }}
        run: |
          for dmg in src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg; do
            echo "Notarizing: $dmg"
            xcrun notarytool submit "$dmg" \
              --key api_key.p8 \
              --key-id "${{ secrets.APPLE_API_KEY }}" \
              --issuer "${{ secrets.APPLE_API_ISSUER }}" \
              --wait
            echo "Stapling: $dmg"
            xcrun stapler staple "$dmg"
          done

      - name: Cleanup API Key
        if: always()
        run: rm -f api_key.p8

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatshell-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-linux:
    name: Build Linux
    needs: check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build App
        run: pnpm tauri build --target x86_64-unknown-linux-gnu --bundles appimage

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatshell-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  release:
    name: Create Release & Upload to R2
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/chatshell-windows/*.msi
            release/chatshell-macos/*
            release/chatshell-linux/*.AppImage
          generate_release_notes: true

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Upload to Cloudflare R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Uploading artifacts for v${VERSION} to R2..."
          rclone copy release/chatshell-macos/ "r2:${R2_BUCKET}/v${VERSION}/darwin/universal/" --include "*.dmg" -v
          rclone copy release/chatshell-windows/ "r2:${R2_BUCKET}/v${VERSION}/windows/x86_64/" --include "*.msi" -v
          rclone copy release/chatshell-linux/ "r2:${R2_BUCKET}/v${VERSION}/linux/x86_64/" --include "*.AppImage" -v
          echo "R2 upload complete."

  deploy-website:
    name: Deploy Website
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.WEBSITE_REPO }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update version in download page and docs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating download links to v${VERSION}..."

          sed -i "s/const version = '.*'/const version = '${VERSION}'/" src/pages/download.astro
          grep "const version" src/pages/download.astro

          sed -i "s|dl\.chatshell\.app/v[0-9]\+\.[0-9]\+\.[0-9]\+/|dl.chatshell.app/v${VERSION}/|g" src/content/docs/docs/getting-started/index.md
          sed -i "s/ChatShell_[0-9]\+\.[0-9]\+\.[0-9]\+_/ChatShell_${VERSION}_/g" src/content/docs/docs/getting-started/index.md
          grep "dl.chatshell.app" src/content/docs/docs/getting-started/index.md

      - name: Build website
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=chatshell-website
